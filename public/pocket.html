/* ==== SHAKE ==== */
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.shake{
animation:shake .35s;
}

/* ==== GREEN GLOW ==== */
@keyframes glow{
0%{box-shadow:0 0 0px #00ff66;}
50%{box-shadow:0 0 25px #00ff66;}
100%{box-shadow:0 0 8px #00ff66;}
}

.glow{
animation:glow 0.8s ease;
}

/* мягкий shake для input */
@keyframes inputShake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.input-shake{
animation:inputShake .35s ease;
border-color:#ff3b3b !important;
box-shadow:0 0 8px rgba(255,0,0,0.4);
}

<script>
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,d:Math.random()*1});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff88";
ctx.beginPath();
for(let p of particles){
ctx.moveTo(p.x,p.y);
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
}
ctx.fill();
for(let p of particles){
p.y+=p.d;
if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
}
}
let snowInterval = setInterval(draw,33);
</script>
